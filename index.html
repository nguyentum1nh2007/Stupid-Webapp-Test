<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <link rel="stylesheet" href="demo.css">
</head>

<body>
    <aside class="sidebar">
        <div class="brand">
            <span>Home Page</span>
        </div>

        <div class="sidebar-search">
            <input type="text" id="groupSearchInput" placeholder="Search by Group">
        </div>

        <button class="add-group-btn" onclick="openGroupModal()">+ Add New Task Group</button>

        <ul class="group-list" id="groupList">
        </ul>

        <div class="deleted-tasks-btn">
            <button class="btn btn-yellow" style="width: 100%;" onclick="resetAllData()">↺ Reset Data</button>
        </div>

        <div class="deleted-tasks-btn" style="margin-top: 10px;">
            <button class="btn btn-outline" style="width: 100%;" onclick="openRecycleBin()">🗑 View Recycle Bin</button>
        </div>

        <div class="modal-overlay" id="recycleBinModal">
            <div class="modal" style="width: 500px; max-height: 80vh; display: flex; flex-direction: column;">
                <h3>Recycle Bin</h3>
                <div id="recycleBinList"
                    style="flex-grow: 1; overflow-y: auto; margin-bottom: 15px; border-radius: 8px; padding: 10px;">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-red" onclick="deleteAllBinData()">Delete All</button>
                    <button class="btn btn-outline" onclick="closeRecycleBin()">Close</button>
                </div>
            </div>
        </div>
        <div class="modal-overlay" id="confirmationModal">
            <div class="modal" style="width: 400px; display: flex; flex-direction: column;">
                <h3>Confirm Action</h3>
                <div id="confirmationMessage" style="margin-bottom: 20px; color: #555; line-height: 1.5;">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-red" id="confirmBtn">Confirm</button>
                    <button class="btn btn-outline" id="cancelConfirmBtn">Cancel</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="flex items-center">
                <h1 class="page-title">To Do List</h1>
                <div class="search-box">
                    <input type="text" id="taskSearchInput" placeholder="Search by Task">
                </div>
            </div>

            <div class="filter-row">
                <div class="filter-select">
                    Status:
                    <select id="statusFilter">
                        <option value="All">None</option>
                        <option value="Pending">Pending</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <div class="filter-select">
                    Priority:
                    <select id="priorityFilter">
                        <option value="All">None</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="filter-select">
                    Time:
                    <select id="timeFilter">
                        <option value="All">None</option>
                        <option value="Today">Today</option>
                        <option value="Last7Days">Last 7 days</option>
                        <option value="Last30Days">Last 30 days</option>
                        <option value="LongAgo">A long time ago</option>
                    </select>
                </div>
                <div class="filter-select">
                    Sort by:
                    <select id="sortOption">
                        <option value="None">None</option>
                        <option value="Name">Name</option>
                        <option value="Status">Status</option>
                    </select>
                </div>
                <span id="reverseButton" onclick="reverseOrder()" style="cursor: pointer;">↑↓</span>
                <button class="btn btn-yellow" style="margin-left: auto;" onclick="openTaskPanel()">+ New Task</button>
            </div>
        </div>

        <div class="task-list-container" id="taskListContainer">
        </div>
    </main>

    <div class="side-panel" id="taskPanel">
        <div class="panel-header">
            <h3>Task Detail</h3>
            <button class="close-btn" onclick="closeTaskPanel()">&times;</button>
        </div>

        <div class="form-group">
            <label>Task</label>
            <input type="text" id="inputTaskTitle">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="inputTaskDesc"></textarea>
        </div>
        <div class="form-group">
            <label>Task Group</label>
            <select id="inputTaskGroup">
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="inputTaskStatus">
                <option value="Pending">Pending</option>
                <option value="Done">Done</option>
            </select>
        </div>
        <div class="form-group">
            <label>Priority</label>
            <select id="inputTaskPriority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
        </div>
        <div class="form-group" id="inputTaskDateCont">
            <label>Date Created</label>
            <input type="text" id="inputTaskDate">
        </div>
        <div class="form-group" style="display: none;" id="inputTaskUpdateCont">
            <label>Date Updated</label>
            <input type="text" id="inputTaskUpdate">
        </div>
        <div class="panel-footer">
            <button class="btn btn-outline" onclick="deleteCurrentTask()" id="deleteBtn"
                style="color:red; border-color: #ffebee;">Delete Task</button>
            <div class="panel-actions-right">
                <button class="btn btn-outline" onclick="closeTaskPanel()">Cancel</button>
                <button class="btn btn-yellow" onclick="saveTask()">Save changes</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="groupModal">
        <div class="modal">
            <h3>Add New Task Group</h3>
            <div class="form-group">
                <input type="text" id="newGroupName" placeholder="Group Name">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeGroupModal()">Cancel</button>
                <button class="btn btn-yellow" onclick="saveGroup()">Save</button>
            </div>
        </div>
    </div>

    <script src="demo.js"></script>
</body>

</html>
